<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS AI | Chatbot Deployment</title>
    <style>
        :root {
            --nexus-blue: #00d2ff;
            --nexus-dark: #0a0b10;
            --nexus-gray: #1a1c23;
        }
        body {
            background-color: var(--nexus-dark);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .form-container {
            background: var(--nexus-gray);
            padding: 35px;
            border-radius: 12px;
            border: 1px solid #333;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        h2 { color: var(--nexus-blue); margin-top: 0; text-transform: uppercase; letter-spacing: 1px; font-size: 22px; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        .section-label { font-size: 11px; font-weight: 800; color: var(--nexus-blue); text-transform: uppercase; margin-bottom: 15px; display: block; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; margin-bottom: 8px; color: #bbb; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #0f1016;
            border: 1px solid #444;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--nexus-blue); outline: none; }

        .mode-selector {
            display: flex;
            background: #0f1016;
            padding: 5px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .mode-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
            font-weight: bold;
        }
        .mode-btn.active {
            background: var(--nexus-blue);
            color: #000;
        }

        .hidden { display: none; }
        .setup-box { background: #14161f; padding: 15px; border-radius: 8px; border-left: 3px solid var(--nexus-blue); }

        .submit-btn {
            background: var(--nexus-blue);
            color: black;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 6px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
            transition: 0.3s;
        }
        .submit-btn:hover { background: #00e5ff; transform: scale(1.01); }
    </style>
</head>
<body>

<div class="form-container">
    <h2>AI CHATBOT DEPLOYMENT</h2>
    <div class="subtitle">Nexus AI Conversational Infrastructure</div>
    
    <form action="https://formspree.io/f/your-id-here" method="POST">
        <input type="hidden" name="product" value="AI Chatbot Setup">
        
        <div class="section-label">1. Identity & Tone</div>
        <div class="input-group">
            <label>Bot Name / Identity</label>
            <input type="text" name="bot_name" required placeholder="e.g. Aquaverse Assistant">
        </div>
        <div class="input-group">
            <label>Communication Tone</label>
            <select name="bot_tone">
                <option value="professional">Professional & Direct</option>
                <option value="friendly">Friendly & Casual</option>
                <option value="expert">Technical Expert</option>
                <option value="sales">Aggressive Sales Closer</option>
            </select>
        </div>

        <div class="section-label">2. Knowledge Source</div>
        <div class="mode-selector">
            <div id="self-btn" class="mode-btn active" onclick="toggleMode('self')">Self-Serve (Data Link)</div>
            <div id="nexus-btn" class="mode-btn" onclick="toggleMode('nexus')">Nexus (Full Build)</div>
        </div>
        <input type="hidden" name="training_mode" id="training_mode" value="Self-Serve">

        <div id="self-serve-ui" class="setup-box">
            <label>Website URL or Documentation Link for Training</label>
            <input type="url" name="training_data" placeholder="https://your-site.com/faq">
            <p style="font-size:10px; color:#666; margin-top:5px;">*Our AI will scrape this URL to build its knowledge base.</p>
        </div>

        <div id="nexus-ui" class="setup-box hidden">
            <label>Schedule Onboarding Call</label>
            <input type="text" name="onboarding_time" placeholder="e.g. Wednesday at 10AM">
            <p style="font-size:10px; color:#aaa; margin-top:5px;">*We will manually structure your data and build custom logic flows.</p>
        </div>

        <div class="section-label" style="margin-top:20px;">3. Integration</div>
        <div class="input-group">
            <label>Primary Channels (Web, WhatsApp, Line, FB)</label>
            <input type="text" name="target_channels" placeholder="e.g. Webflow Site and Line Official Account">
        </div>

        <div class="input-group">
            <label>Specific Bot Goals</label>
            <textarea name="bot_goals" rows="2" placeholder="e.g. Book hotel viewings, answer pricing questions, collect lead emails"></textarea>
        </div>

        <button type="submit" class="submit-btn">Initialize Bot Sequence</button>
    </form>
</div>

<script>
    function toggleMode(mode) {
        const selfBtn = document.getElementById('self-btn');
        const nexusBtn = document.getElementById('nexus-btn');
        const selfUI = document.getElementById('self-serve-ui');
        const nexusUI = document.getElementById('nexus-ui');
        const typeInput = document.getElementById('training_mode');

        if(mode === 'self') {
            selfBtn.classList.add('active');
            nexusBtn.classList.remove('active');
            selfUI.classList.remove('hidden');
            nexusUI.classList.add('hidden');
            typeInput.value = "Self-Serve";
        } else {
            nexusBtn.classList.add('active');
            selfBtn.classList.remove('active');
            nexusUI.classList.remove('hidden');
            selfUI.classList.add('hidden');
            typeInput.value = "Nexus-Managed";
        }
    }
</script>

</body>
</html>
