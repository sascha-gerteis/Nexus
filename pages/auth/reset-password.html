<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/nexus.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <title>Reset Password | Nexus AI</title>
</head>
<body data-page="reset-password">
  <main class="buyer-auth-page">
    <div class="buyer-auth-card">
      <a class="logo" href="/index.html"><span>Nexus</span></a>
      <h1>Reset your password.</h1>
      <p>Enter a new password for your Nexus account.</p>

      <form id="resetPasswordForm">
        <div class="form-grid">
          <div class="full">
            <label>New password</label>
            <input class="input" name="password" type="password" minlength="8" required placeholder="At least 8 characters">
          </div>
          <div class="full">
            <label>Confirm password</label>
            <input class="input" name="confirm_password" type="password" minlength="8" required placeholder="Repeat password">
          </div>
        </div>
        <button class="btn btn-primary btn-full" style="margin-top:1rem">Update password</button>
      </form>

      <div id="resetStatus"></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script src="/assets/js/nexus-ui.js"></script>
  <script src="/assets/js/nexus-db.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async function () {
      const params = new URLSearchParams(location.search);
      const code = params.get("code");
      const next = params.get("next") || "/pages/buyer/dashboard.html";
      const status = document.getElementById("resetStatus");

      if (code && typeof NexusDB.exchangePasswordRecoveryCode === "function") {
        const { error } = await NexusDB.exchangePasswordRecoveryCode(code);
        if (error) {
          status.innerHTML = `<div class="error">${NexusDB.friendlyAuthMessage(error)}</div>`;
        }
      }

      document.getElementById("resetPasswordForm").addEventListener("submit", async function (event) {
        event.preventDefault();
        const formData = new FormData(event.target);
        const password = String(formData.get("password") || "");
        const confirmPassword = String(formData.get("confirm_password") || "");

        if (password !== confirmPassword) {
          NexusUI.toast("Passwords do not match.");
          return;
        }

        const { error } = await NexusDB.updateCurrentUserPassword(password);
        if (error) {
          NexusUI.toast(NexusDB.friendlyAuthMessage(error));
          return;
        }

        status.innerHTML = `<div class="success"><strong>Password updated.</strong><br>Redirecting...</div>`;
        setTimeout(() => {
          location.href = NexusDB.safeNextPath(next, "/pages/buyer/dashboard.html");
        }, 900);
      });
    });
  </script>
</body>
</html>
