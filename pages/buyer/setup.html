  <script>
    let activeCustomerAutomation = null;
    let activeProduct = null;
    let latestSubmission = null;

    function getParam(name) {
      return new URLSearchParams(location.search).get(name);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeSetupSchema(schema) {
      if (!schema) return [];

      if (Array.isArray(schema)) return schema;

      if (typeof schema === "string") {
        try {
          const parsed = JSON.parse(schema);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      return [];
    }

    function normalizeAnswerKey(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function asAnswerObject(value) {
      if (!value) return {};
      if (typeof value === "string") {
        try {
          const parsed = JSON.parse(value);
          return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
        } catch {
          return {};
        }
      }
      return typeof value === "object" && !Array.isArray(value) ? value : {};
    }

    function mergeSetupAnswers(submission) {
      const source = submission || {};
      const answers = asAnswerObject(source.answers);
      const setupAnswers = asAnswerObject(source.setup_answers);
      const setup = asAnswerObject(source.setup);

      return {
        ...answers,
        ...setupAnswers,
        ...setup,
        ...asAnswerObject(answers.setup),
        ...asAnswerObject(answers.setup_answers)
      };
    }

    function answerValue(existingAnswers, name) {
      const answers = existingAnswers || {};

      if (answers[name] !== undefined && answers[name] !== null) {
        return answers[name];
      }

      const normalizedName = normalizeAnswerKey(name);
      const match = Object.keys(answers).find(key => normalizeAnswerKey(key) === normalizedName);

      return match ? answers[match] : "";
    }

    function fieldRequired(field) {
      return field.required ? "required" : "";
    }

    function renderField(field, existingAnswers = {}, options = {}) {
      const name = field.name || "";
      const label = field.label || name;
      const type = field.type || "text";
      const required = fieldRequired(field);
      const value = type === "secret" ? "" : answerValue(existingAnswers, name);

      if (!name) return "";

      if (type === "textarea") {
        return `
          <div class="full">
            <label>${escapeHtml(label)} ${field.required ? "<span>*</span>" : ""}</label>
            <textarea
              class="textarea"
              name="${escapeHtml(name)}"
              ${required}
              placeholder="${escapeHtml(field.placeholder || "")}"
            >${escapeHtml(value)}</textarea>
            ${field.description ? `<small>${escapeHtml(field.description)}</small>` : ""}
          </div>
        `;
      }

      if (type === "select") {
        const optionsList = Array.isArray(field.options) ? field.options : [];

        return `
          <div>
            <label>${escapeHtml(label)} ${field.required ? "<span>*</span>" : ""}</label>
            <select class="select" name="${escapeHtml(name)}" ${required}>
              <option value="">Choose...</option>
              ${optionsList.map(option => `
                <option value="${escapeHtml(option)}" ${String(value) === String(option) ? "selected" : ""}>
                  ${escapeHtml(option)}
                </option>
              `).join("")}
            </select>
            ${field.description ? `<small>${escapeHtml(field.description)}</small>` : ""}
          </div>
        `;
      }

      if (type === "secret") {
        const secretRequired = field.required && !options.hasSubmitted ? "required" : "";
        const placeholder = options.hasSubmitted
          ? "Leave blank to keep saved credential"
          : (field.placeholder || "Paste API key, token, or secret value");

        return `
          <div>
            <label>${escapeHtml(label)} ${field.required ? "<span>*</span>" : ""}</label>
            <input
              class="input"
              type="password"
              name="${escapeHtml(name)}"
              value=""
              ${secretRequired}
              placeholder="${escapeHtml(placeholder)}"
              autocomplete="off"
              data-secret-field="true"
            >
            <small>
              ${escapeHtml(field.description || "This credential is used only for this automation and is never shown back after saving.")}
              ${options.hasSubmitted ? " Leave blank to keep the saved value." : ""}
            </small>
          </div>
        `;
      }

      const htmlType = ["text", "email", "url", "number"].includes(type) ? type : "text";

      return `
        <div>
          <label>${escapeHtml(label)} ${field.required ? "<span>*</span>" : ""}</label>
          <input
            class="input"
            type="${htmlType}"
            name="${escapeHtml(name)}"
            value="${escapeHtml(value)}"
            ${required}
            placeholder="${escapeHtml(field.placeholder || "")}"
          >
          ${field.description ? `<small>${escapeHtml(field.description)}</small>` : ""}
        </div>
      `;
    }

    function cleanFlag(value) {
      return String(value || "").trim().toLowerCase();
    }

    function isBuyerOwnedCredentialField(field, product = {}) {
      const owner = cleanFlag(field.owner || field.credential_owner || field.credentialOwner || field.scope);
      const mode = cleanFlag(field.mode || field.credential_mode || field.credentialMode);
      const source = cleanFlag(field.source || field.source_type || field.sourceType);
      const visibility = cleanFlag(field.visibility || field.audience || field.exposed_to);

      if (
        field.customer_owned === true ||
        field.buyer_owned === true ||
        field.customer_visible === true ||
        field.buyer_visible === true ||
        field.expose_to_buyer === true ||
        owner === "customer" ||
        owner === "buyer" ||
        mode === "customer_owned" ||
        source === "customer" ||
        source === "buyer" ||
        visibility === "customer" ||
        visibility === "buyer"
      ) {
        return true;
      }

      if (
        field.developer_owned === true ||
        field.internal === true ||
        field.admin_only === true ||
        owner === "developer" ||
        owner === "dev" ||
        owner === "admin" ||
        owner === "nexus" ||
        owner === "internal" ||
        mode === "developer_owned" ||
        mode === "private_per_customer" ||
        source === "developer" ||
        source === "admin" ||
        source === "nexus" ||
        source === "internal"
      ) {
        return false;
      }

      const fieldName = normalizeAnswerKey(field.name || field.key || field.credential_key);
      const devSlots = Array.isArray(product.developer_credential_requirements)
        ? product.developer_credential_requirements
        : [];
      const devSlotMatches = devSlots.some(slot => {
        const keys = [
          slot.credential_key,
          slot.key,
          slot.provider,
          slot.provider_label,
          slot.n8n_credential_type,
          slot.node_name
        ].map(normalizeAnswerKey).filter(Boolean);

        return fieldName && keys.some(key => key === fieldName || key.includes(fieldName) || fieldName.includes(key));
      });

      if (devSlotMatches) return false;

      /*
        Credential schema is sensitive. If a field is not explicitly buyer/customer-owned,
        keep it out of the customer setup form. Developer credentials live in the Nexus
        credential vault and are validated by product technical checks instead.
      */
      return false;
    }



async function resolveProductFromCustomerAutomation(automation) {
  /*
    Try every possible shape first.
    Supabase joins can come back as object, array, or under different keys depending on the query.
  */
  const possibleProduct =
    (Array.isArray(automation.automations) ? automation.automations[0] : automation.automations) ||
    (Array.isArray(automation.automation) ? automation.automation[0] : automation.automation) ||
    (Array.isArray(automation.product) ? automation.product[0] : automation.product) ||
    null;

  const joinedSetupSchema = normalizeSetupSchema(possibleProduct?.setup_schema);
  const joinedCredentialSchema = normalizeSetupSchema(possibleProduct?.credential_schema);

  if (possibleProduct && (joinedSetupSchema.length || joinedCredentialSchema.length)) {
    return possibleProduct;
  }

  /*
    Fallback:
    If the customer automation only has automation_id, fetch the product directly.
    This prevents the setup form from falling back to generic notes just because the join failed.
  */
  const automationId =
    automation.automation_id ||
    automation.automations_id ||
    automation.product_id ||
    automation.orders?.automation_id ||
    (Array.isArray(automation.orders) ? automation.orders[0]?.automation_id : "");

  if (!automationId) {
    console.warn("Could not resolve automation_id from customer automation:", automation);
    return possibleProduct || {};
  }

  if (typeof NexusDB.getAutomationById === "function") {
    const { data, error } = await NexusDB.getAutomationById(automationId);

    if (!error && data) {
      return {
        ...(possibleProduct || {}),
        ...data,
        setup_schema: data.setup_schema || possibleProduct?.setup_schema || [],
        credential_schema: data.credential_schema || possibleProduct?.credential_schema || []
      };
    }

    console.warn("Fallback getAutomationById failed:", error);
  }

  return possibleProduct || {};
}






    async function initSetupPage() {
      const root = document.getElementById("setupRoot");
      const customerAutomationId = getParam("id");

      const user = await NexusDB.requireBuyer(location.pathname + location.search);
      if (!user) return;

      if (!customerAutomationId) {
        root.innerHTML = `
          <div class="card">
            <h2>Setup link is missing.</h2>
            <p>Go back to your buyer dashboard and choose the automation you want to set up.</p>
            <a class="btn btn-primary" href="/pages/buyer/dashboard.html">Go to dashboard</a>
          </div>
        `;
        return;
      }

      let automation = null;
      let submission = null;
      let error = null;
      let loadedProduct = null;

      if (typeof NexusDB.getBuyerAutomationSetupData === "function") {
        const serverResult = await NexusDB.getBuyerAutomationSetupData(customerAutomationId);

        if (!serverResult.error && serverResult.data?.customer_automation) {
          automation = {
            ...serverResult.data.customer_automation,
            automations: serverResult.data.automation || null,
            orders: serverResult.data.order || null
          };
          loadedProduct = serverResult.data.automation || null;
          submission = serverResult.data.latest_submission || null;
        } else {
          error = serverResult.error || null;
          console.warn("Server setup loader failed, falling back to browser query:", serverResult.error);
        }
      }

      if (!automation) {
        const [{ data: fallbackAutomation, error: fallbackError }, { data: fallbackSubmission }] = await Promise.all([
          NexusDB.getBuyerCustomerAutomationById(customerAutomationId),
          NexusDB.getLatestSetupSubmission(customerAutomationId)
        ]);

        automation = fallbackAutomation;
        submission = fallbackSubmission;
        error = fallbackError;
      }

      if (error || !automation) {
        root.innerHTML = `
          <div class="card">
            <h2>Automation not found.</h2>
            <p>This setup page could not be loaded. Please return to your dashboard.</p>
            <a class="btn btn-primary" href="/pages/buyer/dashboard.html">Go to dashboard</a>
          </div>
        `;
        return;
      }

      activeCustomerAutomation = automation;
activeProduct = loadedProduct || await resolveProductFromCustomerAutomation(automation);
latestSubmission = submission;

renderSetupForm(root);
    }

    function renderSetupForm(root) {
      const product = activeProduct || {};
      const automation = activeCustomerAutomation || {};
      const order = Array.isArray(automation.orders)
        ? automation.orders[0] || {}
        : automation.orders || {};

      const setupSchema = normalizeSetupSchema(product.setup_schema);
      const allCredentialSchema = normalizeSetupSchema(product.credential_schema);
      const credentialSchema = allCredentialSchema.filter(field => isBuyerOwnedCredentialField(field, product));

      const existingAnswers = mergeSetupAnswers(latestSubmission);
      const installType = automation.install_type || order.install_type || "self_serve";
     const hasSubmitted = !!latestSubmission;
const isGuided = installType === "nexus_guided";

const runtimeStatus = String(automation.runtime_status || "").toLowerCase();
const status = String(automation.status || "").toLowerCase();

const isRunning =
  runtimeStatus === "running" ||
  status === "running";

const needsCustomerAction =
  automation.needs_customer_action === true &&
  !isRunning;

const hasRuntimeError =
  runtimeStatus === "error" &&
  !needsCustomerAction &&
  !isRunning;

const lastErrorMessage = automation.last_error_message || "";
const lastErrorCode = automation.last_error_code || "";
const lastErrorNode = automation.last_error_node || "";

const showCustomerError =
  !isRunning && automation.needs_customer_action;

const showAdminHiddenError =
  !isRunning &&
  String(automation.runtime_status || "").toLowerCase() === "error" &&
  !automation.needs_customer_action;
      const hasAnySchema = setupSchema.length || credentialSchema.length;

const setupFieldsHtml = setupSchema.length
  ? setupSchema.map(field => renderField(field, existingAnswers, { hasSubmitted })).join("")
  : (
      hasAnySchema
        ? ""
        : `
          <div class="full">
            <div class="error">
              <strong>This automation setup is not ready yet.</strong><br>
              Nexus could not load the setup questions for this automation. Please message Nexus from your dashboard and we will fix the setup link.
            </div>
          </div>
        `
    );

      const credentialFieldsHtml = credentialSchema.length
        ? `
          <div class="full setup-form-section-title">
            <h3>Credentials / Access</h3>
            <p>
              Paste customer-owned credentials only, such as a Meta access token.
              Developer-paid services like Apify, Gemini, YouTube API keys, and internal infrastructure are handled by Nexus.
            </p>
          </div>

          ${credentialSchema.map(field => renderField(field, existingAnswers, { hasSubmitted, isCredential: true })).join("")}
        `
        : "";

      const formFields = setupFieldsHtml + credentialFieldsHtml;

      root.innerHTML = `
        <div class="buyer-setup-layout">
          <aside class="buyer-setup-summary">
            <span class="${NexusUI.pillClass(product.color || "blue")}">
              ${escapeHtml(product.badge || product.category || "Automation")}
            </span>

            <h1>${escapeHtml(product.title || automation.name || "Automation setup")}</h1>

            <p>
              ${escapeHtml(product.short_description || "Complete the setup details so Nexus can launch this automation.")}
            </p>

            <div class="setup-meta-list">
              <div>
                <span>Payment</span>
                <strong>${escapeHtml(order.payment_status || "paid")}</strong>
              </div>

              <div>
                <span>Setup method</span>
                <strong>${isGuided ? "Nexus Guided Install" : "Self-Serve"}</strong>
              </div>

              <div>
                <span>Setup status</span>
                <strong>${hasSubmitted ? "Submitted" : "Required"}</strong>
              </div>
            </div>

            <div class="setup-help-box">
              <strong>${isGuided ? "Guided install selected" : "Self-serve setup"}</strong>
              <p>
                ${
                  isGuided
                    ? "Submit the intake details below. Nexus will contact you to complete configuration."
                    : "Submit the required setup details. If this automation is self-serve, Nexus will start the workflow automatically."
                }
              </p>
            </div>

            ${
              credentialSchema.length
                ? `
                  <div class="setup-help-box">
                    <strong>Credentials required</strong>
                    <p>
                      This automation asks for ${credentialSchema.length} credential field${credentialSchema.length === 1 ? "" : "s"}.
                      Leave a saved credential blank if you are updating setup details and do not want to change it.
                    </p>
                  </div>
                `
                : ""
            }

            <a class="btn btn-secondary btn-full" href="/pages/buyer/dashboard.html">
              Back to dashboard
            </a>
          </aside>

          <section class="buyer-setup-card">
            <span class="eyebrow">${hasSubmitted ? "Update setup" : "Complete setup"}</span>

            <h2>${hasSubmitted ? "Your setup was submitted." : "Tell Nexus what this automation needs."}</h2>

           <p>
  ${
    hasSubmitted
      ? "You can update the form below if something changed. Nexus will use the latest submission."
      : "These questions are specific to this automation. After submission, Nexus will prepare the workflow and display outputs in your dashboard."
  }
</p>

${
  isRunning
    ? `
      <div class="success" style="margin:1rem 0">
        <strong>Automation running</strong><br>
        Nexus is currently processing your automation. Outputs or errors will appear in your dashboard when the run finishes.
      </div>
    `
    : ""
}

${
  needsCustomerAction
    ? `
      <div class="error" style="margin:1rem 0">
        <strong>Action required</strong><br>
        ${escapeHtml(lastErrorMessage || "Some setup details need to be updated before this automation can continue.")}
        ${
          lastErrorCode
            ? `<br><small>Error code: ${escapeHtml(lastErrorCode)}</small>`
            : ""
        }
        ${
          lastErrorNode
            ? `<br><small>Failed step: ${escapeHtml(lastErrorNode)}</small>`
            : ""
        }
        <br><br>
        Please update the fields below and submit again.
      </div>
    `
    : ""
}

${
  hasRuntimeError
    ? `
      <div class="error" style="margin:1rem 0">
        <strong>Automation failed</strong><br>
        Nexus has been notified. You do not need to change anything right now.
      </div>
    `
    : ""
}

<form id="buyerSetupForm">

${
  needsCustomerAction
    ? `
      <div class="error" style="margin:1rem 0">
        <strong>Action required</strong><br>
        ${escapeHtml(lastErrorMessage || "Some setup details need to be updated before this automation can continue.")}
        ${
          lastErrorCode
            ? `<br><small>Error code: ${escapeHtml(lastErrorCode)}</small>`
            : ""
        }
        <br><br>
        Please update the fields below and submit again.
      </div>
    `
    : hasRuntimeError
      ? `
        <div class="error" style="margin:1rem 0">
          <strong>Automation failed</strong><br>
          Nexus has been notified. You do not need to change anything right now.
        </div>
      `
      : ""
}

<form id="buyerSetupForm">
              <div class="form-grid">
                ${formFields}

                ${
                  isGuided
                    ? `
                      <div>
                        <label>Best contact person</label>
                        <input class="input" name="guided_contact_name" value="${escapeHtml(answerValue(existingAnswers, "guided_contact_name") || "")}" placeholder="Name">
                      </div>

                      <div>
                        <label>Preferred contact method</label>
                        <select class="select" name="guided_contact_method">
                          <option value="">Choose...</option>
                          <option value="Email" ${answerValue(existingAnswers, "guided_contact_method") === "Email" ? "selected" : ""}>Email</option>
                          <option value="Phone" ${answerValue(existingAnswers, "guided_contact_method") === "Phone" ? "selected" : ""}>Phone</option>
                          <option value="WhatsApp" ${answerValue(existingAnswers, "guided_contact_method") === "WhatsApp" ? "selected" : ""}>WhatsApp</option>
                          <option value="Google Meet" ${answerValue(existingAnswers, "guided_contact_method") === "Google Meet" ? "selected" : ""}>Google Meet</option>
                        </select>
                      </div>

                      <div class="full">
                        <label>Preferred setup time / notes</label>
                        <textarea class="textarea" name="guided_notes" placeholder="Tell Nexus when and how to contact your team.">${escapeHtml(answerValue(existingAnswers, "guided_notes") || "")}</textarea>
                      </div>
                    `
                    : ""
                }
              </div>

              <button type="submit" class="btn btn-primary" style="margin-top:1rem">
                ${hasSubmitted ? "Update setup details" : "Submit setup details"}
              </button>
            </form>

            <div id="setupSubmitResult"></div>
          </section>
        </div>
      `;

      document.getElementById("buyerSetupForm").onsubmit = submitSetupForm;
    }

    async function submitSetupForm(event) {
      event.preventDefault();

      const form = event.target;
      const button = form.querySelector("button[type='submit']");
      const originalText = button.textContent;

      button.disabled = true;
      button.textContent = "Submitting setup...";

      const formData = new FormData(form);
      const answers = {};

      for (const [key, value] of formData.entries()) {
        answers[key] = String(value || "").trim();
      }

      const automation = activeCustomerAutomation;

      if (!automation || !automation.id) {
        NexusUI.toast("Automation was not loaded. Refresh and try again.");
        button.disabled = false;
        button.textContent = originalText;
        return;
      }

      if (typeof NexusDB.submitAutomationSetup !== "function") {
        NexusUI.toast("Setup submit function is missing in nexus-db.js.");
        button.disabled = false;
        button.textContent = originalText;
        return;
      }

      const { data, error } = await NexusDB.submitAutomationSetup({
        customer_automation_id: automation.id,
        answers
      });

      if (error) {
        const rawMessage = String(error.message || "");
        const safeMessage =
          /n8n|webhook|runtime|supabase|authorization header|requested webhook|function/i.test(rawMessage)
            ? "Your setup could not be fully started yet. Nexus has received the issue and will review the automation."
            : rawMessage || "Could not submit setup.";

        NexusUI.toast(safeMessage);

        document.getElementById("setupSubmitResult").innerHTML = `
          <div class="error" style="margin-top:1rem">
            <strong>Setup needs review.</strong><br>
            ${escapeHtml(safeMessage)}
          </div>
        `;

        button.disabled = false;
        button.textContent = originalText;
        return;
      }

      latestSubmission = data?.submission || {
        answers
      };

      document.getElementById("setupSubmitResult").innerHTML = `
        <div class="success" style="margin-top:1rem">
          <strong>Setup submitted.</strong><br>
          ${
            data?.triggered_n8n
              ? "Your automation has started. Outputs will appear in your dashboard when it finishes."
              : data?.message || "Nexus has received your setup details. Your automation will be prepared next."
          }
        </div>
      `;

      NexusUI.toast(
        data?.triggered_n8n
          ? "Setup submitted. Automation started."
          : "Setup submitted. Nexus is preparing the automation."
      );

      button.disabled = false;
      button.textContent = "Update setup details";

      setTimeout(function () {
        location.href = "/pages/buyer/dashboard.html";
      }, 1800);
    }

    document.addEventListener("DOMContentLoaded", initSetupPage);
  </script>
</body>
