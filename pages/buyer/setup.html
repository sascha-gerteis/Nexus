  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/nexus.css?v=20260713-code-stability">

  <script src="/assets/js/config.js?v=20260713-code-stability"></script>

<body data-page="buyer-setup">
  <header class="site-header">
    <div class="container nav">
      <a class="logo" href="/index.html">
        <span>Nexus&nbsp;</span>
      </a>

      <nav class="nav-links">
        <a class="nav-link" href="/index.html">Home</a>
        <a class="nav-link" href="/pages/marketplace/index.html">Marketplace</a>
        <a class="nav-link active" href="/pages/buyer/dashboard.html">Dashboard</a>
        <a class="nav-link" href="/pages/contact/index.html">Support</a>
        <button class="btn btn-secondary btn-small" type="button" onclick="NexusDB.signOut()">Logout</button>
      </nav>
    </div>
  </header>

  <main class="buyer-setup-page">
    <section class="container">
      <div id="setupRoot">
        <div class="card">
          <h2>Loading setup form...</h2>
          <p>Please wait while Nexus prepares your automation setup form.</p>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="/assets/js/nexus-ui.js?v=20260713-code-stability"></script>
  <script src="/assets/js/nexus-db.js?v=20260714-paid-orders-only"></script>

  <script>
    let activeCustomerAutomation = null;
    let activeProduct = null;
    let latestSubmission = null;
    let activeBundleSetup = null;

    function getParam(name) {
      return new URLSearchParams(location.search).get(name);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeSetupSchema(schema) {
      if (!schema) return [];

      if (Array.isArray(schema)) return schema;

      if (typeof schema === "string") {
        try {
          const parsed = JSON.parse(schema);
          return normalizeSetupSchema(parsed);
        } catch {
          return [];
        }
      }

      if (typeof schema === "object") {
        const candidates = [
          schema.fields,
          schema.setup_fields,
          schema.setupFields,
          schema.questions,
          schema.schema,
          schema.items
        ];

        for (const candidate of candidates) {
          const normalized = normalizeSetupSchema(candidate);
          if (normalized.length) return normalized;
        }
      }

      return [];
    }

    function normalizeAnswerKey(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function asAnswerObject(value) {
      if (!value) return {};
      if (typeof value === "string") {
        try {
          const parsed = JSON.parse(value);
          return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
        } catch {
          return {};
        }
      }
      return typeof value === "object" && !Array.isArray(value) ? value : {};
    }

    function mergeSetupAnswers(submission) {
      const source = submission || {};
      const answers = asAnswerObject(source.answers);
      const setupAnswers = asAnswerObject(source.setup_answers);
      const setup = asAnswerObject(source.setup);

      return {
        ...answers,
        ...setupAnswers,
        ...setup,
        ...asAnswerObject(answers.setup),
        ...asAnswerObject(answers.setup_answers)
      };
    }

    function answerValue(existingAnswers, name) {
      const answers = existingAnswers || {};

      if (answers[name] !== undefined && answers[name] !== null) {
        return answers[name];
      }

      const normalizedName = normalizeAnswerKey(name);
      const match = Object.keys(answers).find(key => normalizeAnswerKey(key) === normalizedName);

      return match ? answers[match] : "";
    }

    function fieldRequired(field) {
      return field.required ? "required" : "";
    }

    function isMonthlyCadenceSetupField(field = {}) {
      const name = normalizeAnswerKey(field.name || field.key || field.credential_key || "");
      const label = String(field.label || "").trim().toLowerCase();
      const text = [
        field.name,
        field.key,
        field.label,
        field.description,
        field.placeholder
      ].map(value => String(value || "")).join(" ").toLowerCase();

      if (/report[_\s-]*(period|range)|date[_\s-]*range|time[_\s-]*frame|period[_\s-]*(start|end)/.test(text)) {
        return false;
      }

      return (
        [
          "frequency",
          "run_frequency",
          "schedule_frequency",
          "report_frequency",
          "delivery_frequency",
          "cadence",
          "run_cadence",
          "schedule_cadence",
          "how_often",
          "repeat_every",
          "interval"
        ].includes(name) ||
        /\b(run|schedule|delivery|report)\s+(frequency|cadence)\b/.test(text) ||
        /\bhow often\b|\brepeat every\b|\bmonthly cadence\b/.test(text) ||
        label === "frequency" ||
        label === "cadence"
      );
    }

    function shouldRenderBuyerSetupField(field = {}, options = {}) {
      const name = normalizeAnswerKey(field.name || field.key || field.credential_key || "");
      const label = String(field.label || "").trim().toLowerCase();
      const text = [
        field.name,
        field.key,
        field.label,
        field.description,
        field.placeholder
      ].map(value => String(value || "")).join(" ").toLowerCase();

      if (
        name === "google_sheet_access_mode" ||
        name === "nexus_sheet_access_mode" ||
        name === "sheet_access_mode" ||
        label === "how should nexus get access?" ||
        /how should nexus get access/.test(text)
      ) {
        return false;
      }

      if (options.hideMonthlyCadence && isMonthlyCadenceSetupField(field)) {
        return false;
      }

      return true;
    }

    function renderField(field, existingAnswers = {}, options = {}) {
      const name = field.name || "";
      const label = field.label || name;
      const type = field.type || "text";
      const required = fieldRequired(field);
      const value = type === "secret" ? "" : answerValue(existingAnswers, name);

      if (!name) return "";

      if (type === "textarea") {
        return `
          <div class="full">
            <label>${escapeHtml(label)} ${field.required ? "<span>*</span>" : ""}</label>
            <textarea
              class="textarea"
              name="${escapeHtml(name)}"
              ${required}
              placeholder="${escapeHtml(field.placeholder || "")}"
            >${escapeHtml(value)}</textarea>
            ${field.description ? `<small>${escapeHtml(field.description)}</small>` : ""}
          </div>
        `;
      }

      if (type === "select") {
        const optionsList = Array.isArray(field.options) ? field.options : [];

        return `
          <div>
            <label>${escapeHtml(label)} ${field.required ? "<span>*</span>" : ""}</label>
            <select class="select" name="${escapeHtml(name)}" ${required}>
              <option value="">Choose...</option>
              ${optionsList.map(option => `
                <option value="${escapeHtml(option)}" ${String(value) === String(option) ? "selected" : ""}>
                  ${escapeHtml(option)}
                </option>
              `).join("")}
            </select>
            ${field.description ? `<small>${escapeHtml(field.description)}</small>` : ""}
          </div>
        `;
      }

      if (type === "secret") {
        const secretRequired = field.required && !options.hasSubmitted ? "required" : "";
        const placeholder = options.hasSubmitted
          ? "Leave blank to keep saved credential"
          : (field.placeholder || "Paste API key, token, or secret value");

        return `
          <div>
            <label>${escapeHtml(label)} ${field.required ? "<span>*</span>" : ""}</label>
            <input
              class="input"
              type="password"
              name="${escapeHtml(name)}"
              value=""
              ${secretRequired}
              placeholder="${escapeHtml(placeholder)}"
              autocomplete="off"
              data-secret-field="true"
            >
            <small>
              ${escapeHtml(field.description || "This credential is used only for this automation and is never shown back after saving.")}
              ${options.hasSubmitted ? " Leave blank to keep the saved value." : ""}
            </small>
          </div>
        `;
      }

      const htmlType = ["text", "email", "url", "number"].includes(type) ? type : "text";

      return `
        <div>
          <label>${escapeHtml(label)} ${field.required ? "<span>*</span>" : ""}</label>
          <input
            class="input"
            type="${htmlType}"
            name="${escapeHtml(name)}"
            value="${escapeHtml(value)}"
            ${required}
            placeholder="${escapeHtml(field.placeholder || "")}"
          >
          ${field.description ? `<small>${escapeHtml(field.description)}</small>` : ""}
        </div>
      `;
    }

    function bundleFieldWorkflowIds(field = {}) {
      return [...new Set((field.sources || [])
        .map(source => source.customer_automation_id)
        .filter(Boolean)
        .map(String))];
    }

    function bundleEntryKey(entry = {}) {
      return String(entry.automation?.id || entry.automation?.customer_automation_id || entry.automation?.automation_id || "");
    }

    function bundleEntryTitle(entry = {}) {
      return entry.product?.title || entry.automation?.name || entry.automation?.automation_title || "Workflow";
    }

    function bundleFieldIsShared(field = {}) {
      if (field.type === "secret") return true;
      return bundleFieldWorkflowIds(field).length !== 1;
    }

    function bundleFieldLabel(field = {}, productTitle = "") {
      const label = field.label || field.name || "";
      const prefix = productTitle ? `${productTitle}:` : "";
      return prefix && label.startsWith(prefix) ? label.slice(prefix.length).trim() : label;
    }

    function renderBundleFieldList(fields = [], existingAnswers = {}, options = {}) {
      return fields.map(field => {
        const label = bundleFieldLabel(field, options.productTitle || "");
        return renderField({ ...field, label }, existingAnswers, options);
      }).join("");
    }

    function openBundleSetupSection(index) {
      const sections = [...document.querySelectorAll("[data-bundle-section]")];
      if (!sections.length) return;
      const nextIndex = Math.max(0, Math.min(index, sections.length - 1));

      sections.forEach((section, sectionIndex) => {
        section.open = sectionIndex === nextIndex;
      });

      sections[nextIndex]?.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    window.openBundleSetupSection = openBundleSetupSection;

    function renderBundleSetupFields(bundleSetup, setupFields = [], credentialFields = [], existingAnswers = {}, options = {}) {
      const entries = bundleSetup?.entries || [];
      const sharedSetupFields = setupFields.filter(bundleFieldIsShared);
      const workflowFields = setupFields.filter(field => !bundleFieldIsShared(field));
      const sharedFields = [...credentialFields, ...sharedSetupFields];

      const workflowSections = entries.map((entry, index) => {
        const entryKey = bundleEntryKey(entry);
        const productTitle = bundleEntryTitle(entry);
        const fields = workflowFields.filter(field => bundleFieldWorkflowIds(field).includes(entryKey));
        const countLabel = `${fields.length} question${fields.length === 1 ? "" : "s"}`;

        return `
          <details class="bundle-setup-section" data-bundle-section ${index === 0 ? "open" : ""}>
            <summary class="bundle-setup-summary-row">
              <span>
                <strong>${escapeHtml(productTitle)}</strong>
                <small>${escapeHtml(countLabel)}</small>
              </span>
              <span class="bundle-setup-expand">Expand</span>
            </summary>

            <div class="bundle-setup-section-body">
              ${
                fields.length
                  ? `<div class="bundle-setup-grid">${renderBundleFieldList(fields, existingAnswers, { ...options, productTitle })}</div>`
                  : `<p class="bundle-setup-empty">No extra questions for this workflow. Shared details above are enough.</p>`
              }

              ${
                index < entries.length - 1
                  ? `<button type="button" class="btn btn-secondary bundle-setup-next" onclick="openBundleSetupSection(${index + 1})">Next workflow</button>`
                  : `<p class="bundle-setup-finish">All workflow sections are visible. Submit once below to start the included workflows.</p>`
              }
            </div>
          </details>
        `;
      }).join("");

      return `
        <div class="full bundle-setup-flow">
          ${
            sharedFields.length
              ? `
                <section class="bundle-setup-shared">
                  <div class="setup-form-section-title">
                    <h3>Shared details</h3>
                    <p>Fill these once. Nexus reuses them across the workflows that need the same information.</p>
                  </div>
                  <div class="bundle-setup-grid">
                    ${renderBundleFieldList(sharedFields, existingAnswers, options)}
                  </div>
                </section>
              `
              : ""
          }

          <section class="bundle-setup-workflows">
            <div class="setup-form-section-title">
              <h3>Workflow setup</h3>
              <p>Open each workflow, complete its questions, then submit once at the end.</p>
            </div>

            ${workflowSections}
          </section>
        </div>
      `;
    }

    function cleanFlag(value) {
      return String(value || "").trim().toLowerCase();
    }

    function isBuyerOwnedCredentialField(field, product = {}) {
      const owner = cleanFlag(field.owner || field.credential_owner || field.credentialOwner || field.scope);
      const mode = cleanFlag(field.mode || field.credential_mode || field.credentialMode);
      const source = cleanFlag(field.source || field.source_type || field.sourceType);
      const visibility = cleanFlag(field.visibility || field.audience || field.exposed_to);

      if (
        field.customer_owned === true ||
        field.buyer_owned === true ||
        field.customer_visible === true ||
        field.buyer_visible === true ||
        field.expose_to_buyer === true ||
        owner === "customer" ||
        owner === "buyer" ||
        mode === "customer_owned" ||
        source === "customer" ||
        source === "buyer" ||
        visibility === "customer" ||
        visibility === "buyer"
      ) {
        return true;
      }

      if (
        field.developer_owned === true ||
        field.internal === true ||
        field.admin_only === true ||
        owner === "developer" ||
        owner === "dev" ||
        owner === "admin" ||
        owner === "nexus" ||
        owner === "internal" ||
        mode === "developer_owned" ||
        mode === "private_per_customer" ||
        source === "developer" ||
        source === "admin" ||
        source === "nexus" ||
        source === "internal"
      ) {
        return false;
      }

      const fieldName = normalizeAnswerKey(field.name || field.key || field.credential_key);
      const devSlots = Array.isArray(product.developer_credential_requirements)
        ? product.developer_credential_requirements
        : [];
      const devSlotMatches = devSlots.some(slot => {
        const keys = [
          slot.credential_key,
          slot.key,
          slot.provider,
          slot.provider_label,
          slot.n8n_credential_type,
          slot.node_name
        ].map(normalizeAnswerKey).filter(Boolean);

        return fieldName && keys.some(key => key === fieldName || key.includes(fieldName) || fieldName.includes(key));
      });

      if (devSlotMatches) return false;

      /*
        In customer setup, credential_schema means "buyer-provided access" unless the
        product explicitly marks the field as developer/internal owned. This keeps bundle
        setup from announcing a required Meta/Google/etc. token without rendering the input.
      */
      return true;
    }

    function fieldTextForMatching(field = {}) {
      return [
        field.name,
        field.key,
        field.credential_key,
        field.label,
        field.description,
        field.placeholder,
        field.provider,
        field.service,
        field.scope,
        field.owner
      ].map(value => String(value || "")).join(" ").toLowerCase();
    }

    function canonicalBundleToken(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/([a-z])([A-Z])/g, "$1_$2")
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function fieldNameForMatching(field = {}) {
      return canonicalBundleToken(field.name || field.key || field.credential_key || field.label || "");
    }

    function detectBundleProvider(text) {
      if (/\b(openai|chatgpt|gpt)\b/.test(text)) return "openai";
      if (/\b(apify)\b/.test(text)) return "apify";
      if (/\b(gemini|google_ai|palm)\b/.test(text)) return "gemini";
      if (/\b(anthropic|claude)\b/.test(text)) return "anthropic";
      if (/\b(meta|facebook|fb|instagram|ig)\b/.test(text)) return "meta";
      if (/\b(google|gmail|sheets|drive|calendar)\b/.test(text)) return "google";
      if (/\b(slack)\b/.test(text)) return "slack";
      if (/\b(telegram)\b/.test(text)) return "telegram";
      if (/\b(stripe)\b/.test(text)) return "stripe";
      if (/\b(shopify)\b/.test(text)) return "shopify";
      if (/\b(hubspot)\b/.test(text)) return "hubspot";
      if (/\b(airtable)\b/.test(text)) return "airtable";
      if (/\b(notion)\b/.test(text)) return "notion";
      if (/\b(sendgrid)\b/.test(text)) return "sendgrid";
      if (/\b(resend)\b/.test(text)) return "resend";
      if (/\b(smtp|email_server|mail_server)\b/.test(text)) return "smtp";
      if (/\b(twilio|whatsapp)\b/.test(text)) return "twilio";
      if (/\b(serpapi)\b/.test(text)) return "serpapi";
      if (/\b(serper)\b/.test(text)) return "serper";
      return "";
    }

    function detectBundleService(text, provider = "") {
      if (provider === "meta") {
        const hasInstagram = /\b(instagram|ig)\b/.test(text);
        const hasFacebook = /\b(facebook|fb|page)\b/.test(text);
        if (hasInstagram && !hasFacebook) return "instagram";
        if (hasFacebook && !hasInstagram) return "facebook";
        return "";
      }

      if (provider === "google") {
        if (/\b(gmail)\b/.test(text)) return "gmail";
        if (/\b(sheet|sheets|spreadsheet)\b/.test(text)) return "sheets";
        if (/\b(drive)\b/.test(text)) return "drive";
        if (/\b(calendar)\b/.test(text)) return "calendar";
      }

      return "";
    }

    function detectBundleCredentialKind(text) {
      if (/\b(refresh[_\s-]*token)\b/.test(text)) return "refresh_token";
      if (/\b(access[_\s-]*token|bearer|token)\b/.test(text)) return "access_token";
      if (/\b(client[_\s-]*secret|consumer[_\s-]*secret)\b/.test(text)) return "client_secret";
      if (/\b(client[_\s-]*id|consumer[_\s-]*key)\b/.test(text)) return "client_id";
      if (/\b(api[_\s-]*key|apikey|secret[_\s-]*key|key)\b/.test(text)) return "api_key";
      if (/\b(password|pass)\b/.test(text)) return "password";
      if (/\b(username|user)\b/.test(text)) return "username";
      if (/\b(webhook)\b/.test(text)) return "webhook_url";
      return "credential";
    }

    function detectBundleSetupPurpose(field = {}) {
      const text = fieldTextForMatching(field);
      const name = fieldNameForMatching(field);

      if (/\b(instagram|ig)\b/.test(text) && /\b(url|profile|handle|account)\b/.test(text)) return "instagram_profile";
      if (/\b(tiktok)\b/.test(text) && /\b(url|profile|handle|account)\b/.test(text)) return "tiktok_profile";
      if (/\b(facebook|fb)\b/.test(text) && /\b(url|page|profile|handle|account)\b/.test(text)) return "facebook_page";
      if (/\b(linkedin)\b/.test(text) && /\b(url|page|profile|handle|account)\b/.test(text)) return "linkedin_page";
      if (/\b(youtube)\b/.test(text) && /\b(url|channel|profile|handle|account)\b/.test(text)) return "youtube_channel";
      if (/\b(competitor|competitors)\b/.test(text) && /\b(url|website|site|domain|websites)\b/.test(text)) return "competitor_urls";
      if (/\b(company|business|brand|buyer|main)\b/.test(text) && /\b(url|website|site|domain)\b/.test(text)) return "company_website";
      if (/\b(report)\b/.test(text) && /\b(title|name)\b/.test(text)) return "report_title";
      if (/\b(focus|topics|areas|keywords)\b/.test(text)) return "focus_areas";
      if (/\b(market|region|country|location)\b/.test(text)) return "market_region";
      if (/\b(company|business|brand)\b/.test(text) && /\b(name)\b/.test(text)) return "business_name";
      if (/\b(customer|audience|buyer)\b/.test(text) && /\b(type|profile|persona|target)\b/.test(text)) return "target_customer";
      if (/\b(email)\b/.test(text)) return "contact_email";
      if (/\b(phone|whatsapp)\b/.test(text)) return "contact_phone";

      return name || "setup_field";
    }

    function describeBundleField(field = {}, kind = "setup") {
      const text = fieldTextForMatching(field);

      if (kind === "credential") {
        const provider = detectBundleProvider(text) || canonicalBundleToken(field.provider || field.service || "credential");
        return {
          kind,
          provider,
          service: detectBundleService(text, provider),
          credentialKind: detectBundleCredentialKind(text),
          rawKey: fieldNameForMatching(field)
        };
      }

      return {
        kind,
        purpose: detectBundleSetupPurpose(field),
        rawKey: fieldNameForMatching(field)
      };
    }

    function makeMetaAccessTokenField() {
      return {
        name: "meta_access_token",
        label: "Meta access token",
        type: "secret",
        required: true,
        customer_owned: true,
        provider: "meta",
        service: "meta",
        credential_kind: "access_token",
        placeholder: "EAAB...",
        description: "Paste the Meta access token for the Facebook or Instagram assets this automation should use. Do not paste this in brand notes."
      };
    }

    function hasMetaAccessCredentialField(fields = []) {
      return fields.some(field => {
        const text = fieldTextForMatching(field);
        const name = fieldNameForMatching(field);
        return (
          /\b(meta|facebook|fb|instagram|ig)\b/.test(text) &&
          /\b(access[_\s-]*token|bearer|token)\b/.test(text)
        ) || [
          "meta_access_token",
          "facebook_access_token",
          "instagram_access_token",
          "fb_access_token",
          "ig_access_token"
        ].includes(name);
      });
    }

    function productLooksLikeMetaSetup(product = {}, setupSchema = []) {
      const detected = asAnswerObject(product.detected_placeholders);
      const placeholderText = JSON.stringify([
        detected,
        product.placeholder_mappings,
        product.placeholderMappings,
        product.workflow_variables,
        product.workflowVariables,
        product.n8n_import_result,
        product.n8n_last_import_result
      ] || {}).toLowerCase();
      const productText = [
        product.title,
        product.slug,
        product.category,
        product.badge,
        product.short_description,
        product.long_description,
        product.problem,
        product.outcome,
        product.name,
        product.description,
        product.workflow_source_platform,
        placeholderText
      ].map(value => String(value || "")).join(" ").toLowerCase();

      const setupText = setupSchema.map(field => fieldTextForMatching(field)).join(" ");
      const hasSocialProduct = /\b(meta|facebook|fb|instagram|ig|social media|social listening)\b/.test(productText);
      const hasMetaSetupField = /\b(meta|facebook|fb|instagram|ig)\b/.test(setupText);
      const hasTokenPlaceholder = /\b(meta|facebook|fb|instagram|ig)[_\s-]*(access[_\s-]*)?token\b|\b(access[_\s-]*)?token\b.*\b(meta|facebook|instagram)\b/.test(placeholderText);
      const hasLegacyBrandNotes = setupSchema.some(field => fieldNameForMatching(field) === "brand_notes");
      const hasLegacySocialNotes = setupSchema.some(field => {
        const name = fieldNameForMatching(field);
        const text = fieldTextForMatching(field);
        return (
          name === "brand_notes" ||
          name === "notes" ||
          name === "social_notes" ||
          name === "brand_context" ||
          /\b(brand|social|facebook|instagram|meta)\b/.test(text)
        );
      });

      return hasTokenPlaceholder || hasMetaSetupField || hasLegacyBrandNotes || (hasSocialProduct && hasLegacySocialNotes);
    }

    function inferBuyerCredentialFields(setupSchema = [], credentialSchema = [], product = {}) {
      const fields = [...credentialSchema];
      if (productLooksLikeMetaSetup(product, setupSchema) && !hasMetaAccessCredentialField(fields)) {
        fields.push(makeMetaAccessTokenField());
      }
      return fields;
    }

    function bundleFieldLabelFromSemantic(semantic, fallback = "") {
      const key = String(semantic || "").replace(/^setup:/, "").replace(/^credential:/, "");
      const labels = {
        instagram_profile: "Instagram profile URL",
        tiktok_profile: "TikTok profile URL",
        facebook_page: "Facebook page URL",
        linkedin_page: "LinkedIn page URL",
        youtube_channel: "YouTube channel URL",
        competitor_urls: "Competitor websites",
        company_website: "Company website",
        report_title: "Report title",
        focus_areas: "Focus areas",
        market_region: "Market or region",
        business_name: "Business name",
        target_customer: "Target customer",
        contact_email: "Contact email",
        contact_phone: "Contact phone"
      };

      if (labels[key]) return labels[key];

      if (key.includes(":")) {
        const parts = key.split(":").filter(Boolean);
        const provider = parts[0] || "";
        const service = parts[1] && parts[1] !== "general" ? `${parts[1]} ` : "";
        const kind = parts[2] || parts[1] || "credential";
        return `${service}${provider} ${kind}`.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      }

      return fallback || key.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    }

    function mergeBundleFieldType(currentType, nextType) {
      if (currentType === "secret" || nextType === "secret") return "secret";
      if (currentType === "textarea" || nextType === "textarea") return "textarea";
      if (currentType === nextType) return currentType;
      if (["url", "email", "number"].includes(currentType) && nextType === "text") return currentType;
      if (["url", "email", "number"].includes(nextType) && currentType === "text") return nextType;
      return "text";
    }

    function bundleFieldFormName(semantic) {
      return `bundle_${canonicalBundleToken(semantic).slice(0, 80) || "field"}`;
    }

    const SHARED_BUNDLE_SETUP_PURPOSES = new Set([
      "instagram_profile",
      "tiktok_profile",
      "facebook_page",
      "linkedin_page",
      "youtube_channel",
      "company_website",
      "business_name",
      "contact_email",
      "contact_phone",
      "market_region"
    ]);

    function shouldShareBundleSetupSource(source = {}) {
      if (source.kind !== "setup") return true;
      const purpose = source.descriptor?.purpose || source.descriptor?.rawKey || "";
      return SHARED_BUNDLE_SETUP_PURPOSES.has(purpose);
    }

    function productScopedBundleSemantic(source = {}) {
      const descriptor = source.descriptor || {};
      const fieldKey = descriptor.rawKey || fieldNameForMatching(source.field) || "field";
      const purpose = descriptor.purpose || fieldKey;
      const automationId =
        source.entry?.automation?.id ||
        source.entry?.automation?.automation_id ||
        source.entry?.product?.id ||
        "workflow";

      return `setup:${purpose}:${automationId}:${fieldKey}`;
    }

    function isLegacyBrandNotesField(field = {}) {
      return (
        field.semantic === "setup:brand_notes" ||
        fieldNameForMatching(field) === "brand_notes" ||
        (Array.isArray(field.original_field_names) && field.original_field_names.some(name => canonicalBundleToken(name) === "brand_notes"))
      );
    }

    function isMetaAccessTokenField(field = {}) {
      const text = fieldTextForMatching(field);
      const semantic = String(field.semantic || "").toLowerCase();
      return (
        semantic.includes("credential:meta") ||
        fieldNameForMatching(field) === "meta_access_token" ||
        (/\b(meta|facebook|instagram)\b/.test(text) && /\b(access[_\s-]*token|token)\b/.test(text))
      );
    }

    function buildBundleSetupModel(entries) {
      const sources = [];

      for (const entry of entries || []) {
        const product = entry.product || {};
        const setupSchema = normalizeSetupSchema(product.setup_schema);
        const credentialSchema = inferBuyerCredentialFields(
          setupSchema,
          normalizeSetupSchema(product.credential_schema)
            .filter(field => isBuyerOwnedCredentialField(field, product)),
          product
        );

        for (const field of setupSchema) {
          if (!field?.name) continue;
          sources.push({ entry, kind: "setup", field, descriptor: describeBundleField(field, "setup") });
        }

        for (const field of credentialSchema) {
          const name = field.name || field.key || field.credential_key;
          if (!name) continue;
          sources.push({ entry, kind: "credential", field: { ...field, name }, descriptor: describeBundleField(field, "credential") });
        }
      }

      const specificServices = new Map();
      for (const source of sources) {
        const descriptor = source.descriptor;
        if (source.kind !== "credential" || !descriptor.provider || !descriptor.service) continue;
        const key = `${descriptor.provider}:${descriptor.credentialKind}`;
        const values = specificServices.get(key) || new Set();
        values.add(descriptor.service);
        specificServices.set(key, values);
      }

      const grouped = new Map();

      for (const source of sources) {
        const descriptor = source.descriptor;
        let semantic = "";

        if (source.kind === "credential") {
          const provider = descriptor.provider || "credential";
          let service = descriptor.service || "";
          const serviceSet = specificServices.get(`${provider}:${descriptor.credentialKind}`);
          if (!service && serviceSet?.size === 1) service = [...serviceSet][0];
          semantic = `credential:${provider}:${service || "general"}:${descriptor.credentialKind}`;
        } else if (shouldShareBundleSetupSource(source)) {
          semantic = `setup:${descriptor.purpose || descriptor.rawKey}`;
        } else {
          semantic = productScopedBundleSemantic(source);
        }

        const formName = bundleFieldFormName(semantic);
        const originalName = source.field.name || source.field.key || source.field.credential_key;
        const productTitle = source.entry.product?.title || source.entry.automation?.name || "Workflow";
        const sourceRecord = {
          customer_automation_id: source.entry.automation.id,
          automation_id: source.entry.automation.automation_id,
          product_title: productTitle,
          field_name: originalName,
          kind: source.kind
        };
        const existing = grouped.get(formName);

        if (!existing) {
          grouped.set(formName, {
            ...source.field,
            name: formName,
            label: source.kind === "setup" && !shouldShareBundleSetupSource(source)
              ? `${productTitle}: ${source.field.label || bundleFieldLabelFromSemantic(`setup:${descriptor.purpose || descriptor.rawKey}`, originalName)}`
              : bundleFieldLabelFromSemantic(semantic, source.field.label || originalName),
            type: source.kind === "credential" ? "secret" : source.field.type || "text",
            required: Boolean(source.field.required),
            semantic,
            sources: [sourceRecord],
            original_field_names: [originalName],
            bundle_field: true
          });
        } else {
          existing.required = Boolean(existing.required || source.field.required);
          existing.type = mergeBundleFieldType(existing.type || "text", source.kind === "credential" ? "secret" : source.field.type || "text");
          existing.sources.push(sourceRecord);
          if (!existing.original_field_names.includes(originalName)) existing.original_field_names.push(originalName);
        }
      }

      const hasMetaCredential = [...grouped.values()].some(field => field.type === "secret" && isMetaAccessTokenField(field));
      const fields = [...grouped.values()].map(field => {
        const workflowCount = new Set(field.sources.map(source => source.customer_automation_id)).size;
        const originalDescription = field.description || "";
        const isBrandNotes = isLegacyBrandNotesField(field);
        return {
          ...field,
          label: isBrandNotes ? "Brand notes and report goals" : field.label,
          required: isBrandNotes && hasMetaCredential ? false : field.required,
          description: [
            isBrandNotes && hasMetaCredential
              ? "Optional context only. Paste the Meta access token in the Credentials / Access field, not here."
              : originalDescription,
            workflowCount > 1 ? `Used by ${workflowCount} workflows in this bundle.` : ""
          ].filter(Boolean).join(" ")
        };
      });

      const existingAnswers = {};
      for (const field of fields) {
        for (const source of field.sources || []) {
          const entry = entries.find(item => item.automation?.id === source.customer_automation_id);
          const answers = mergeSetupAnswers(entry?.submission);
          const value = answerValue(answers, source.field_name);
          if (value !== undefined && value !== null && String(value).trim()) {
            existingAnswers[field.name] = value;
            break;
          }
        }
      }

      return { is_bundle_setup: true, entries, fields, existingAnswers };
    }

    async function loadBundleSetupContext(primaryAutomation, primaryProduct, primarySubmission) {
      const order = Array.isArray(primaryAutomation?.orders)
        ? primaryAutomation.orders[0] || {}
        : primaryAutomation?.orders || {};
      const orderId = primaryAutomation?.order_id || order.id;
      const bundleId = primaryAutomation?.bundle_id || order.bundle_id;

      if (!orderId || typeof NexusDB.getBuyerCustomerAutomationsByOrderId !== "function") return null;

      if (bundleId && typeof NexusDB.ensureCustomerAutomations === "function") {
        try {
          await NexusDB.ensureCustomerAutomations(orderId);
        } catch (error) {
          console.warn("Could not repair bundle customer automations before loading setup:", error);
        }
      }

      const { data: rows, error } = await NexusDB.getBuyerCustomerAutomationsByOrderId(orderId);
      if (error || !Array.isArray(rows) || rows.length < 2) {
        if (error) console.warn("Could not load bundle setup automations:", error);
        return null;
      }

      const bundleRows = bundleId
        ? rows.filter(row => {
            const rowOrder = Array.isArray(row.orders) ? row.orders[0] || {} : row.orders || {};
            return String(row.bundle_id || rowOrder.bundle_id || "") === String(bundleId);
          })
        : rows;

      if (bundleRows.length < 2) return null;

      const entries = await Promise.all(bundleRows.map(async row => {
        const product = row.id === primaryAutomation.id
          ? primaryProduct
          : await resolveProductFromCustomerAutomation(row);
        const submission = row.id === primaryAutomation.id
          ? primarySubmission
          : (await NexusDB.getLatestSetupSubmission(row.id)).data || null;

        return { automation: row, product: product || {}, submission };
      }));

      const model = buildBundleSetupModel(entries);
      return model.fields.length ? model : null;
    }

    async function loadBundleSetupContextByOrderId(orderId, bundleId = "") {
      if (!orderId || typeof NexusDB.getBuyerCustomerAutomationsByOrderId !== "function") {
        return null;
      }

      if (typeof NexusDB.ensureCustomerAutomations === "function") {
        try {
          await NexusDB.ensureCustomerAutomations(orderId);
        } catch (error) {
          console.warn("Could not ensure bundle customer automations:", error);
        }
      }

      const { data: rows, error } = await NexusDB.getBuyerCustomerAutomationsByOrderId(orderId);
      if (error || !Array.isArray(rows) || !rows.length) {
        if (error) console.warn("Could not load order setup automations:", error);
        return null;
      }

      const bundleRows = bundleId
        ? rows.filter(row => {
            const rowOrder = Array.isArray(row.orders) ? row.orders[0] || {} : row.orders || {};
            return String(row.bundle_id || rowOrder.bundle_id || "") === String(bundleId);
          })
        : rows.filter(row => {
            const rowOrder = Array.isArray(row.orders) ? row.orders[0] || {} : row.orders || {};
            return row.bundle_id || rowOrder.bundle_id || rowOrder.order_type === "bundle";
          });

      const rowsForSetup = bundleRows.length ? bundleRows : rows;

      const entries = await Promise.all(rowsForSetup.map(async row => {
        const product = await resolveProductFromCustomerAutomation(row);
        const submission = (await NexusDB.getLatestSetupSubmission(row.id)).data || null;
        return { automation: row, product: product || {}, submission };
      }));

      const model = buildBundleSetupModel(entries);
      if (!model.fields.length) return null;

      return {
        model,
        primaryAutomation: entries[0]?.automation || rowsForSetup[0],
        primaryProduct: entries[0]?.product || {},
        primarySubmission: entries[0]?.submission || null
      };
    }



async function resolveProductFromCustomerAutomation(automation) {
  /*
    Try every possible shape first.
    Supabase joins can come back as object, array, or under different keys depending on the query.
  */
  const possibleProduct =
    (Array.isArray(automation.automations) ? automation.automations[0] : automation.automations) ||
    (Array.isArray(automation.automation) ? automation.automation[0] : automation.automation) ||
    (Array.isArray(automation.product) ? automation.product[0] : automation.product) ||
    null;

  const joinedSetupSchema = normalizeSetupSchema(possibleProduct?.setup_schema);
  const joinedCredentialSchema = normalizeSetupSchema(possibleProduct?.credential_schema);

  if (possibleProduct && (joinedSetupSchema.length || joinedCredentialSchema.length)) {
    return possibleProduct;
  }

  /*
    Fallback:
    If the customer automation only has automation_id, fetch the product directly.
    This prevents the setup form from falling back to generic notes just because the join failed.
  */
  const automationId =
    automation.automation_id ||
    automation.automations_id ||
    automation.product_id ||
    automation.orders?.automation_id ||
    (Array.isArray(automation.orders) ? automation.orders[0]?.automation_id : "");

  if (!automationId) {
    console.warn("Could not resolve automation_id from customer automation:", automation);
    return possibleProduct || {};
  }

  if (typeof NexusDB.getAutomationById === "function") {
    const { data, error } = await NexusDB.getAutomationById(automationId);

    if (!error && data) {
      return {
        ...(possibleProduct || {}),
        ...data,
        setup_schema: data.setup_schema || possibleProduct?.setup_schema || [],
        credential_schema: data.credential_schema || possibleProduct?.credential_schema || []
      };
    }

    console.warn("Fallback getAutomationById failed:", error);
  }

  return possibleProduct || {};
}

      if (!user) return;

      if (!customerAutomationId && orderId) {
        const bundleContext = await loadBundleSetupContextByOrderId(orderId, bundleId);

        if (bundleContext?.model) {
          activeCustomerAutomation = bundleContext.primaryAutomation;
          activeProduct = bundleContext.primaryProduct;
          latestSubmission = bundleContext.primarySubmission;
          activeBundleSetup = bundleContext.model;
          renderSetupForm(root);

        const [{ data: fallbackAutomation, error: fallbackError }, { data: fallbackSubmission }] = await Promise.all([
          NexusDB.getBuyerCustomerAutomationById(customerAutomationId),
          NexusDB.getLatestSetupSubmission(customerAutomationId)

                        </select>
                      </div>

                      <div class="full">
                        <label>Preferred setup time / notes</label>
                        <textarea class="textarea" name="guided_notes" placeholder="Tell Nexus when and how to contact your team.">${escapeHtml(answerValue(existingAnswers, "guided_notes") || "")}</textarea>
                      </div>
                    `
                    : ""
                }
              </div>

              <button type="submit" class="btn btn-primary" style="margin-top:1rem">
                ${
                  bundleSetup
                    ? hasSubmitted ? "Update bundle setup" : "Submit bundle setup and start workflows"
                    : hasSubmitted ? "Update setup details" : "Submit setup details"
                }
              </button>
            </form>

            <div id="setupSubmitResult"></div>
          </section>
        </div>
      `;

      document.getElementById("buyerSetupForm").onsubmit = submitSetupForm;
    }

    function buildBundleAnswersForWorkflow(entry, answers) {
      const mappedAnswers = {};
      const customerAutomationId = entry?.automation?.id;

      for (const field of activeBundleSetup?.fields || []) {
        const value = answers[field.name];
        const hasValue = value !== undefined && value !== null && String(value).trim() !== "";

        if (!hasValue && field.type === "secret") continue;

        for (const source of field.sources || []) {
          if (source.customer_automation_id !== customerAutomationId) continue;
          if (!source.field_name) continue;
          mappedAnswers[source.field_name] = value || "";
        }
      }

      for (const guidedKey of ["guided_contact_name", "guided_contact_method", "guided_notes"]) {
        if (answers[guidedKey]) mappedAnswers[guidedKey] = answers[guidedKey];
      }

      return mappedAnswers;
    }

    async function submitBundleSetupForm(form, button, originalText, answers) {
      const entries = activeBundleSetup?.entries || [];
      const resultEl = document.getElementById("setupSubmitResult");

      if (!entries.length) {
        NexusUI.toast("Bundle setup was not loaded. Refresh and try again.");
        button.disabled = false;
        button.textContent = originalText;
        return;
      }

      const results = (await Promise.all(entries.map(async entry => {
        const customerAutomationId = entry?.automation?.id;
        if (!customerAutomationId) return null;

        const mappedAnswers = buildBundleAnswersForWorkflow(entry, answers);
        const { data, error } = await NexusDB.submitAutomationSetup({
          customer_automation_id: customerAutomationId,
          answers: mappedAnswers
        });

        return {
          entry,
          data,
          error,
          answers: mappedAnswers
        };
      }))).filter(Boolean);

      const failures = results.filter(item => item.error);

      if (failures.length) {
        const onlyRuntimeWaits = failures.every(item =>
          /submit-automation-setup timed out|timed out/i.test(String(item.error?.message || ""))
        );

        if (onlyRuntimeWaits) {
          const waitMessage = `Your bundle setup was saved. The included workflow${entries.length === 1 ? "" : "s"} may still be running, so outputs will appear in your dashboard when they finish.`;

          if (resultEl) {
            resultEl.innerHTML = `
              <div class="success" style="margin-top:1rem">
                <strong>Bundle setup submitted.</strong><br>
                ${escapeHtml(waitMessage)}
              </div>
            `;
          }

          NexusUI.toast("Bundle setup submitted. Check your dashboard for outputs.");
          button.disabled = false;
          button.textContent = "Update setup details";
          setTimeout(function () {
            location.href = "/pages/buyer/dashboard.html";
          }, 1800);
          return;
        }

        const safeMessage = "Your bundle setup was saved for some workflows, but Nexus needs to review one included workflow before everything can start.";
        NexusUI.toast(safeMessage);

        if (resultEl) {
          resultEl.innerHTML = `
            <div class="error" style="margin-top:1rem">
              <strong>Bundle setup needs review.</strong><br>
              ${escapeHtml(safeMessage)}
            </div>
          `;
        }

        button.disabled = false;
        button.textContent = originalText;
        return;
      }

      latestSubmission = {
        answers
      };

      for (const result of results) {
        const entry = activeBundleSetup.entries.find(item => item.automation?.id === result.entry?.automation?.id);
        if (entry) {
          entry.submission = result.data?.submission || { answers: result.answers };
        }
      }

      activeBundleSetup.existingAnswers = answers;

      if (resultEl) {
        resultEl.innerHTML = `
          <div class="success" style="margin-top:1rem">
            <strong>Bundle setup submitted.</strong><br>
            Nexus is preparing ${entries.length} included workflow${entries.length === 1 ? "" : "s"}.
          </div>
        `;
      }

      NexusUI.toast("Bundle setup submitted. Nexus is preparing the workflows.");

      button.disabled = false;
      button.textContent = "Update setup details";

      setTimeout(function () {
        location.href = "/pages/buyer/dashboard.html";
      }, 1800);
    }

    async function submitSetupForm(event) {
      event.preventDefault();

      const form = event.target;
      const button = form.querySelector("button[type='submit']");
      const originalText = button.textContent;

      button.disabled = true;
      button.textContent = "Submitting setup...";

      const formData = new FormData(form);
      const answers = {};

      for (const [key, value] of formData.entries()) {
        answers[key] = String(value || "").trim();
      }

      const automation = activeCustomerAutomation;

      if (!automation || !automation.id) {
        NexusUI.toast("Automation was not loaded. Refresh and try again.");
        button.disabled = false;
        button.textContent = originalText;
        return;
      }

      if (typeof NexusDB.submitAutomationSetup !== "function") {
        NexusUI.toast("Setup submit function is missing in nexus-db.js.");
        button.disabled = false;
        button.textContent = originalText;
        return;
      }

      if (activeBundleSetup?.is_bundle_setup) {
        await submitBundleSetupForm(form, button, originalText, answers);
        return;
      }

      const { data, error } = await NexusDB.submitAutomationSetup({
        customer_automation_id: automation.id,
        answers
      });

      if (error) {
        const rawMessage = String(error.message || "");
        if (/submit-automation-setup timed out|timed out/i.test(rawMessage)) {
          const waitMessage = "Your setup was saved. The automation may still be running, so outputs will appear in your dashboard when it finishes.";

          NexusUI.toast("Setup submitted. Check your dashboard for outputs.");
          document.getElementById("setupSubmitResult").innerHTML = `
            <div class="success" style="margin-top:1rem">
              <strong>Setup submitted.</strong><br>
              ${escapeHtml(waitMessage)}
            </div>
          `;

          button.disabled = false;
          button.textContent = "Update setup details";
          setTimeout(function () {
            location.href = "/pages/buyer/dashboard.html";
          }, 1800);
          return;
        }

        const safeMessage =
          /n8n|webhook|runtime|supabase|authorization header|requested webhook|function/i.test(rawMessage)
            ? "Your setup could not be fully started yet. Nexus has received the issue and will review the automation."
            : rawMessage || "Could not submit setup.";

        NexusUI.toast(safeMessage);

        document.getElementById("setupSubmitResult").innerHTML = `
          <div class="error" style="margin-top:1rem">
            <strong>Setup needs review.</strong><br>
            ${escapeHtml(safeMessage)}
          </div>
        `;

        button.disabled = false;
        button.textContent = originalText;
        return;
      }

      latestSubmission = data?.submission || {
        answers
      };

      document.getElementById("setupSubmitResult").innerHTML = `
        <div class="success" style="margin-top:1rem">
          <strong>Setup submitted.</strong><br>
          ${
            data?.triggered_n8n
              ? "Your automation has started. Outputs will appear in your dashboard when it finishes."
              : data?.message || "Nexus has received your setup details. Your automation will be prepared next."
          }
        </div>
      `;

      NexusUI.toast(
        data?.triggered_n8n
          ? "Setup submitted. Automation started."
          : "Setup submitted. Nexus is preparing the automation."
      );

      button.disabled = false;
      button.textContent = "Update setup details";

      setTimeout(function () {
        location.href = "/pages/buyer/dashboard.html";
      }, 1800);
    }

    document.addEventListener("DOMContentLoaded", initSetupPage);
  </script>
</body>
</html>
